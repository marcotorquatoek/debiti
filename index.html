<title>Debiti</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#000;--bg2:#1c1c1e;--bg3:#2c2c2e;--bg4:#2a2a2a;--text:#fff;--text2:#888;--text3:#636366;--text4:#48484a;--border:#2c2c2e;--border2:#3a3a3c;--divider:#1c1c1e;--card:#1c1c1e;--input:#1c1c1e;--input-focus:#111;--fab:#fff;--fab-text:#000;--green:#30d158;--red:#ff453a;--orange:#ff9f0a;}
body.light{--bg:#f2f2f7;--bg2:#fff;--bg3:#e5e5ea;--bg4:#d1d1d6;--text:#000;--text2:#666;--text3:#8e8e93;--text4:#aeaeb2;--border:#e5e5ea;--border2:#d1d1d6;--divider:#e5e5ea;--card:#fff;--input:#f2f2f7;--input-focus:#e8e8ed;--fab:#000;--fab-text:#fff;--green:#34c759;--red:#ff3b30;--orange:#ff9500;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:100px;max-width:430px;margin:0 auto;transition:background .2s,color .2s}
body.panel-open{overflow:hidden}
.header{padding:56px 24px 8px;display:flex;justify-content:space-between;align-items:center}
.header-left{font-size:17px;font-weight:400;color:var(--text2);display:flex;align-items:center;gap:6px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);display:inline-block;transition:background .3s}
.sync-dot.syncing{background:var(--orange)}.sync-dot.ok{background:var(--green)}
.header-right{display:flex;align-items:center;gap:8px}
.version-badge{font-size:11px;font-weight:600;color:var(--text3);background:var(--bg2);border-radius:6px;padding:3px 7px}
.theme-btn{width:32px;height:32px;border-radius:50%;background:var(--bg2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px}
.theme-btn:active{opacity:.7}
.avatar-btn{width:34px;height:34px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--text);border:none}
.hero{padding:8px 24px 28px}
.hero-label{font-size:14px;color:var(--text2);margin-bottom:4px}
.hero-amount{font-size:52px;font-weight:800;letter-spacing:-2px;color:var(--text);line-height:1}
.hero-amount .euro{font-size:28px;font-weight:800;vertical-align:super;margin-right:3px}
.section-title{padding:0 24px 14px}
.section-title h2{font-size:17px;font-weight:600;color:var(--text)}
.person-row{display:flex;align-items:center;gap:14px;padding:14px 24px;cursor:pointer;transition:background .1s}
.person-row:active{background:var(--bg3)}
.person-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#000;flex-shrink:0}
.person-info{flex:1;min-width:0}
.person-name-row{font-size:16px;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;color:var(--text)}
.person-badge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px}
.badge-give{background:rgba(255,69,58,.15);color:var(--red)}
.badge-receive{background:rgba(48,209,88,.15);color:var(--green)}
.person-sub{font-size:13px;color:var(--text3)}
.person-amount{font-size:16px;font-weight:700}
.person-amount.receive{color:var(--green)}.person-amount.give{color:var(--red)}.person-amount.zero{color:var(--text3)}
.chevron-r{color:var(--border2);font-size:16px}
.divider{height:1px;background:var(--divider);margin:0 24px 0 82px}
.add-fab{position:fixed;bottom:28px;right:24px;width:56px;height:56px;background:var(--fab);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--fab-text);border:none;cursor:pointer;box-shadow:0 4px 24px rgba(0,0,0,.25);z-index:100;line-height:1;transition:background .2s,color .2s}
.add-fab:active{transform:scale(.93)}
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;backdrop-filter:blur(4px)}
.panel-overlay.open{display:block}
.panel{position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;background:var(--card);border-radius:24px 24px 0 0;z-index:201;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,0,.67,0);height:92vh;display:flex;flex-direction:column;overflow:hidden}
.panel.open{transform:translateY(0)}
.panel-handle-area{padding:12px 0 4px;cursor:grab;touch-action:none;user-select:none;flex-shrink:0}
.panel-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto}
.panel-header{padding:14px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.panel-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#000;flex-shrink:0}
.panel-title{flex:1}
.panel-name{font-size:19px;font-weight:600;color:var(--text)}
.panel-direction{font-size:12px;margin-top:2px}
.panel-direction.receive{color:var(--green)}.panel-direction.give{color:var(--red)}
.panel-net{font-size:20px;font-weight:300;letter-spacing:-0.5px;white-space:nowrap}
.panel-net.zero{color:var(--text3)}.panel-net.receive{color:var(--green)}.panel-net.give{color:var(--red)}
.close-btn{background:var(--bg3);border:none;color:var(--text);width:30px;height:30px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.panel-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.debt-row{display:flex;align-items:flex-start;gap:12px;padding:13px 24px;border-bottom:1px solid var(--border)}
.debt-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;font-weight:700;color:#000;margin-top:2px}
.debt-check.done{background:var(--green);border-color:var(--green)}
.debt-text{flex:1;min-width:0}
.debt-desc{font-size:15px;color:var(--text);word-break:break-word}
.debt-meta{font-size:12px;color:var(--text3);margin-top:3px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.debt-date{font-size:11px;color:var(--text4);margin-top:2px}
.debt-dir-tag{font-size:10px;font-weight:600;padding:1px 5px;border-radius:3px}
.tag-give{background:rgba(255,69,58,.15);color:var(--red)}.tag-receive{background:rgba(48,209,88,.15);color:var(--green)}
.debt-row.paid-row .debt-desc{color:var(--border2)}.debt-row.paid-row .debt-meta{color:var(--border2)}.debt-row.paid-row .debt-date{color:var(--border2)}
.debt-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.debt-action-btn{background:transparent;border:none;color:var(--text4);font-size:14px;cursor:pointer;padding:2px 4px;line-height:1}
.debt-action-btn:active{color:var(--text)}
.debt-edit-row{padding:10px 24px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.edit-row-inputs{display:flex;gap:8px}
.edit-dir-row{display:flex;gap:6px}
.edit-dir-btn{flex:1;padding:7px;border-radius:8px;border:none;font-family:'Inter',sans-serif;font-size:16px;font-weight:600;cursor:pointer;background:var(--bg2);color:var(--text3)}
.edit-dir-btn.active-give{background:rgba(255,69,58,.2);color:var(--red)}.edit-dir-btn.active-receive{background:rgba(48,209,88,.2);color:var(--green)}
.edit-save-btn{background:var(--fab);color:var(--fab-text);border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;padding:9px;cursor:pointer;flex:1}
.edit-cancel-btn{background:transparent;border:none;color:var(--text3);font-family:'Inter',sans-serif;font-size:13px;padding:9px;cursor:pointer}
.panel-add{padding:16px 24px;background:var(--bg3);border-top:1px solid var(--border2);flex-shrink:0}
.dir-select-row{display:flex;gap:8px;margin-bottom:8px}
.dir-mini-btn{flex:1;padding:9px;border-radius:9px;border:none;font-family:'Inter',sans-serif;font-size:16px;font-weight:600;cursor:pointer;background:var(--bg2);color:var(--text3);transition:all .15s}
.dir-mini-btn.active-give{background:rgba(255,69,58,.2);color:var(--red)}.dir-mini-btn.active-receive{background:rgba(48,209,88,.2);color:var(--green)}
.panel-add-row{display:flex;gap:8px;margin-bottom:8px}
.panel-input{background:var(--input);border:none;border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;font-size:16px;padding:11px 13px;outline:none;flex:1;-webkit-appearance:none;transition:background .2s}
.panel-input::placeholder{color:var(--text4)}.panel-input:focus{background:var(--input-focus)}
.amt-small{max-width:85px}
.date-input{background:var(--input);border:none;border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;font-size:16px;padding:11px 13px;outline:none;width:100%;-webkit-appearance:none;margin-bottom:8px}
.date-input:focus{background:var(--input-focus)}
.panel-add-btn{background:var(--fab);color:var(--fab-text);border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;padding:11px 0;width:100%;cursor:pointer;transition:background .2s,color .2s}
.panel-add-btn:active{opacity:.8}
/* PDF BUTTON */
.pdf-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin:12px 24px 0;padding:12px;background:var(--bg3);border:none;border-radius:12px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;width:calc(100% - 48px)}
.pdf-btn:active{opacity:.7}
.ded-toggle{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;cursor:pointer;border-top:1px solid var(--border)}
.ded-toggle-label{font-size:13px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.6px}
.ded-toggle-amt{font-size:13px;color:var(--green)}
.ded-row{display:flex;align-items:center;gap:10px;padding:10px 24px;border-bottom:1px solid var(--border)}
.ded-name{flex:1;font-size:14px;color:var(--text3)}.ded-amt{font-size:13px;color:var(--green)}
.ded-add-row{display:flex;gap:8px;padding:10px 24px 4px}
.panel-summary{padding:14px 24px;display:flex;justify-content:space-between;font-size:12px;color:var(--text3);border-top:1px solid var(--border);flex-wrap:wrap;gap:4px}
.panel-summary strong{color:var(--text)}
.del-person-row{padding:12px 24px 24px;text-align:center;border-top:1px solid var(--border)}
.del-person-btn{background:transparent;border:none;color:var(--red);font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;padding:6px 0}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:none;backdrop-filter:blur(4px);align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:430px;margin:0 auto;padding:24px 24px 40px;transition:background .2s}
.modal h3{font-size:18px;font-weight:600;margin-bottom:20px;color:var(--text)}
.modal-input{background:var(--bg3);border:none;border-radius:12px;color:var(--text);font-family:'Inter',sans-serif;font-size:16px;padding:14px 16px;outline:none;width:100%;margin-bottom:12px;-webkit-appearance:none}
.modal-input::placeholder{color:var(--text4)}
.modal-btn{background:var(--fab);color:var(--fab-text);border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:16px;font-weight:600;padding:14px;width:100%;cursor:pointer;margin-bottom:10px;transition:background .2s,color .2s}
.modal-btn:active{opacity:.8}
.modal-cancel{background:transparent;border:none;color:var(--text3);font-family:'Inter',sans-serif;font-size:16px;padding:10px;width:100%;cursor:pointer}
.empty-msg{padding:40px 24px;text-align:center;color:var(--text4);font-size:15px;line-height:1.6}
.loading{padding:40px 24px;text-align:center;color:var(--text3);font-size:14px}

/* PDF PRINT STYLES */
@media print {
  body * { visibility: hidden; }
  #pdf-content, #pdf-content * { visibility: visible; }
  #pdf-content { position: fixed; top: 0; left: 0; width: 100%; }
}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">Saldo <span class="sync-dot" id="sync-dot"></span></div>
  <div class="header-right">
    <span class="version-badge">v8</span>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
    <div class="avatar-btn" onclick="openNameModal()" style="cursor:pointer" id="avatar-btn">M</div>
  </div>
</div>
<div class="hero">
  <div class="hero-label">Mi devono dare</div>
  <div class="hero-amount"><span class="euro">€</span><span id="hero-num">0,00</span></div>
</div>
<div class="section-title"><h2>Persone</h2></div>
<div id="list"><div class="loading">Connessione...</div></div>
<div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-handle-area" id="panel-handle-area"><div class="panel-handle"></div></div>
  <div class="panel-header">
    <div class="panel-avatar" id="panel-avatar"></div>
    <div class="panel-title">
      <div class="panel-name" id="panel-name"></div>
      <div class="panel-direction" id="panel-direction"></div>
    </div>
    <div class="panel-net" id="panel-net"></div>
    <button class="close-btn" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-scroll">
    <div id="panel-debts"></div>
    <div class="panel-add">
      <div class="dir-select-row">
        <button class="dir-mini-btn" id="add-dir-give" onclick="setAddDir('give')">↑ Devo dare</button>
        <button class="dir-mini-btn" id="add-dir-receive" onclick="setAddDir('receive')">↓ Mi devono</button>
      </div>
      <div class="panel-add-row">
        <input class="panel-input" id="new-desc" placeholder="Descrizione..." onkeydown="if(event.key==='Enter')document.getElementById('new-amt').focus()">
        <input class="panel-input amt-small" id="new-amt" type="number" placeholder="€" step="0.01" min="0" onkeydown="if(event.key==='Enter')addDebt()">
      </div>
      <input class="date-input" id="new-date" type="date">
      <button class="panel-add-btn" onclick="addDebt()">Aggiungi voce</button>
    </div>
    <button class="pdf-btn" onclick="printPDF()">🖨️ Stampa riepilogo PDF</button>
    <div class="ded-toggle" onclick="toggleDed()">
      <span class="ded-toggle-label">Da sottrarre</span>
      <span class="ded-toggle-amt" id="ded-total-label">−0,00€</span>
    </div>
    <div id="ded-section" style="display:none">
      <div id="ded-list"></div>
      <div class="ded-add-row">
        <input class="panel-input" id="new-dl" placeholder="Es. Skipass, pranzo..." onkeydown="if(event.key==='Enter')addDed()">
        <input class="panel-input amt-small" id="new-da" type="number" placeholder="€" step="0.01" min="0" onkeydown="if(event.key==='Enter')addDed()">
        <button class="panel-add-btn" style="width:auto;padding:11px 16px" onclick="addDed()">+</button>
      </div>
    </div>
    <div class="panel-summary">
      <span>Mi devono: <strong id="sum-receive" style="color:var(--green)"></strong></span>
      <span>Devo: <strong id="sum-give" style="color:var(--red)"></strong></span>
      <span>Netto: <strong id="sum-net"></strong></span>
    </div>
    <div class="del-person-row"><button class="del-person-btn" id="del-person-btn">Elimina persona</button></div>
  </div>
</div>
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>Nuova persona</h3>
    <input class="modal-input" id="modal-name" placeholder="Nome..." maxlength="40" onkeydown="if(event.key==='Enter')confirmAddPerson()">
    <button class="modal-btn" onclick="confirmAddPerson()">Aggiungi</button>
    <button class="modal-cancel" onclick="closeModal()">Annulla</button>
  </div>
</div>
<button class="add-fab" onclick="openAddPerson()">+</button>


<!-- NAME MODAL -->
<div class="modal-overlay" id="name-modal-overlay">
  <div class="modal">
    <h3>Il tuo nome</h3>
    <input class="modal-input" id="my-name-input" placeholder="Es. Marco..." maxlength="30" onkeydown="if(event.key==='Enter')saveMyName()">
    <button class="modal-btn" onclick="saveMyName()">Salva</button>
    <button class="modal-cancel" onclick="closeNameModal()">Annulla</button>
  </div>
</div>

<!-- HIDDEN PDF CONTENT -->
<div id="pdf-content" style="display:none"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const firebaseConfig={apiKey:"AIzaSyDA27tRKTQpc-mO22FQ8446JO-a-idrqhA",authDomain:"debiti-d89fe.firebaseapp.com",databaseURL:"https://debiti-d89fe-default-rtdb.europe-west1.firebasedatabase.app",projectId:"debiti-d89fe",storageBucket:"debiti-d89fe.firebasestorage.app",messagingSenderId:"768617640084",appId:"1:768617640084:web:66813df2988b1fb029c481"};
const app=initializeApp(firebaseConfig);const db=getDatabase(app);const dbRef=ref(db,"debiti");
const COLORS=["#ffd60a","#ff9f0a","#ff375f","#bf5af2","#0a84ff","#30d158","#5e5ce6","#ff6961"];
let D={persons:[]},activePi=-1,addDir="receive",editingDi=-1,editDir="receive";

// My name
let myName=localStorage.getItem("myName")||"Marco";
function applyMyName(){
  const btn=document.getElementById("avatar-btn");
  if(btn) btn.textContent=(myName||"?").slice(0,1).toUpperCase();
}
window.openNameModal=function(){
  document.getElementById("my-name-input").value=myName;
  document.getElementById("name-modal-overlay").classList.add("open");
  setTimeout(()=>document.getElementById("my-name-input").focus(),150);
};
window.closeNameModal=function(){document.getElementById("name-modal-overlay").classList.remove("open");};
window.saveMyName=function(){
  const v=document.getElementById("my-name-input").value.trim();
  if(!v)return;
  myName=v;
  localStorage.setItem("myName",myName);
  applyMyName();
  closeNameModal();
};
document.getElementById("name-modal-overlay").addEventListener("click",function(e){if(e.target===this)window.closeNameModal();});
applyMyName();

let isLight=localStorage.getItem("theme")==="light";
function applyTheme(){document.body.classList.toggle("light",isLight);document.getElementById("theme-btn").textContent=isLight?"🌙":"☀️";}
window.toggleTheme=function(){isLight=!isLight;localStorage.setItem("theme",isLight?"light":"dark");applyTheme();};
applyTheme();

function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtDate(s){if(!s)return"";const[y,m,d]=s.split("-");return`${d}/${m}/${y}`;}
function lockScroll(){document.body.classList.add("panel-open");}
function unlockScroll(){document.body.classList.remove("panel-open");}

const panel=document.getElementById("panel");
const handleArea=document.getElementById("panel-handle-area");
let dragStartY=0,dragCurrentY=0,isDragging=false;
handleArea.addEventListener("touchstart",e=>{isDragging=true;dragStartY=e.touches[0].clientY;panel.style.transition="none";},{passive:true});
handleArea.addEventListener("touchmove",e=>{if(!isDragging)return;dragCurrentY=Math.max(0,e.touches[0].clientY-dragStartY);panel.style.transform=`translateY(${dragCurrentY}px)`;},{passive:true});
handleArea.addEventListener("touchend",()=>{if(!isDragging)return;isDragging=false;panel.style.transition="transform .35s cubic-bezier(.32,0,.67,0)";if(dragCurrentY>100){closePanel();}else{panel.style.transform="translateY(0)";}dragCurrentY=0;});

const syncDot=document.getElementById("sync-dot");
function setSyncing(){syncDot.className="sync-dot syncing";}
function setSynced(){syncDot.className="sync-dot ok";}
function fmt(n){return n.toLocaleString("it-IT",{minimumFractionDigits:2,maximumFractionDigits:2})+"€";}
function fmtN(n){return n.toLocaleString("it-IT",{minimumFractionDigits:2,maximumFractionDigits:2});}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function saveAll(){setSyncing();set(dbRef,D).then(setSynced).catch(()=>setSynced());}
function calcPerson(p){const debts=p.debts||[];const receive=debts.filter(d=>!d.paid&&d.dir==="receive").reduce((s,d)=>s+d.amount,0);const give=debts.filter(d=>!d.paid&&d.dir==="give").reduce((s,d)=>s+d.amount,0);const ded=(p.deductions||[]).reduce((s,d)=>s+d.amount,0);return{receive,give,ded,net:receive-give-ded};}

onValue(dbRef,snapshot=>{const val=snapshot.val();D=(val&&val.persons)?val:{persons:[]};setSynced();renderList();if(activePi>=0&&activePi<D.persons.length)renderPanel();});

function renderList(){
  const list=document.getElementById("list");
  if(!D.persons.length){list.innerHTML='<div class="empty-msg">Nessuna persona ancora.<br>Tocca <strong>+</strong> per aggiungerne una.</div>';document.getElementById("hero-num").textContent="0,00";return;}
  let totalNet=0;
  list.innerHTML=D.persons.map((p,pi)=>{
    const{net}=calcPerson(p);totalNet+=net;
    const init=p.name.slice(0,2).toUpperCase();
    const unpaid=(p.debts||[]).filter(d=>!d.paid).length;
    const voci=unpaid===1?"1 voce aperta":`${unpaid} voci aperte`;
    const amtClass=net===0?"zero":net>0?"receive":"give";
    const badge=net===0?"":net>0?'<span class="person-badge badge-receive">deve a me</span>':'<span class="person-badge badge-give">gli devo</span>';
    return`<div class="person-row" onclick="window._openPanel(${pi})"><div class="person-avatar" style="background:${p.color}">${init}</div><div class="person-info"><div class="person-name-row">${esc(p.name)} ${badge}</div><div class="person-sub">${voci}</div></div><div class="person-amount ${amtClass}">${fmt(Math.abs(net))}</div><span class="chevron-r">›</span></div><div class="divider"></div>`;
  }).join("");
  document.getElementById("hero-num").textContent=fmtN(Math.abs(totalNet));
}

function openPanel(pi){
  activePi=pi;addDir="receive";editingDi=-1;
  renderPanel();
  document.getElementById("panel-overlay").classList.add("open");
  panel.classList.add("open");panel.style.transform="";lockScroll();
  document.getElementById("new-date").value=todayStr();
  document.getElementById("del-person-btn").onclick=()=>{if(confirm("Eliminare "+D.persons[pi].name+"?")){D.persons.splice(pi,1);saveAll();closePanel();}};
}
window._openPanel=openPanel;
function closePanel(){document.getElementById("panel-overlay").classList.remove("open");panel.classList.remove("open");panel.style.transform="";unlockScroll();activePi=-1;editingDi=-1;}
window.closePanel=closePanel;
function setAddDir(dir){addDir=dir;document.getElementById("add-dir-give").className="dir-mini-btn"+(dir==="give"?" active-give":"");document.getElementById("add-dir-receive").className="dir-mini-btn"+(dir==="receive"?" active-receive":"");}
window.setAddDir=setAddDir;
function setEditDir(dir){editDir=dir;document.getElementById("edit-dir-give").className="edit-dir-btn"+(dir==="give"?" active-give":"");document.getElementById("edit-dir-receive").className="edit-dir-btn"+(dir==="receive"?" active-receive":"");}
window.setEditDir=setEditDir;

function renderPanel(){
  if(activePi<0||activePi>=D.persons.length)return;
  const p=D.persons[activePi];const{receive,give,ded,net}=calcPerson(p);
  document.getElementById("panel-avatar").style.background=p.color;
  document.getElementById("panel-avatar").textContent=p.name.slice(0,2).toUpperCase();
  document.getElementById("panel-name").textContent=p.name;
  const dirEl=document.getElementById("panel-direction");
  if(net>0){dirEl.textContent="Mi deve dare";dirEl.className="panel-direction receive";}
  else if(net<0){dirEl.textContent="Gli devo dare";dirEl.className="panel-direction give";}
  else{dirEl.textContent="Pari";dirEl.className="panel-direction";}
  const ne=document.getElementById("panel-net");ne.textContent=fmt(Math.abs(net));ne.className="panel-net "+(net===0?"zero":net>0?"receive":"give");
  document.getElementById("sum-receive").textContent=fmt(receive);document.getElementById("sum-give").textContent=fmt(give);document.getElementById("sum-net").textContent=fmt(net);document.getElementById("ded-total-label").textContent="−"+fmt(ded);
  setAddDir(addDir);
  const debts=[...(p.debts||[])].map((d,i)=>({...d,_origIdx:i})).sort((a,b)=>{const da=a.date||"0000-00-00",db2=b.date||"0000-00-00";return da<db2?1:da>db2?-1:0;});
  const openDebtsPanel=debts.filter(d=>!d.paid);
  const paidDebtsPanel=debts.filter(d=>d.paid);
  const showHistory=p.showHistory||false;
  const dl=document.getElementById("panel-debts");
  if(!debts.length){dl.innerHTML='<div style="padding:16px 24px;font-size:14px;color:var(--text4)">Nessuna voce ancora.</div>';}
  else{
    const visibleDebts=showHistory?debts:openDebtsPanel;
    dl.innerHTML=visibleDebts.map((d)=>{
    const di=d._origIdx;
    if(editingDi===di){return`<div class="debt-edit-row"><div class="edit-dir-row"><button class="edit-dir-btn${editDir==="give"?" active-give":""}" id="edit-dir-give" onclick="setEditDir('give')">↑ Devo dare</button><button class="edit-dir-btn${editDir==="receive"?" active-receive":""}" id="edit-dir-receive" onclick="setEditDir('receive')">↓ Mi devono</button></div><div class="edit-row-inputs"><input class="panel-input" id="edit-desc" value="${esc(d.desc)}" placeholder="Descrizione..."><input class="panel-input amt-small" id="edit-amt" type="number" value="${d.amount}" step="0.01" min="0"></div><input class="date-input" id="edit-date" type="date" value="${d.date||todayStr()}"><div style="display:flex;gap:8px"><button class="edit-save-btn" onclick="saveEdit(${di})">Salva</button><button class="edit-cancel-btn" onclick="cancelEdit()">Annulla</button></div></div>`;}
    return`<div class="debt-row${d.paid?" paid-row":""}"><div class="debt-check${d.paid?" done":""}" onclick="window._togglePaid(${di})">${d.paid?"✓":""}</div><div class="debt-text"><div class="debt-desc">${esc(d.desc)}</div><div class="debt-meta"><span>${fmt(d.amount)}</span><span class="debt-dir-tag ${d.dir==="give"?"tag-give":"tag-receive"}">${d.dir==="give"?"devo dare":"mi deve"}</span></div>${d.date?`<div class="debt-date">${fmtDate(d.date)}</div>`:""}</div><div class="debt-actions"><button class="debt-action-btn" onclick="startEdit(${di})">✏️</button><button class="debt-action-btn" onclick="window._delDebt(${di})">✕</button></div></div>`;
  }).join("");}
  const deds=p.deductions||[];document.getElementById("ded-list").innerHTML=!deds.length?"":deds.map((d,di)=>`<div class="ded-row"><div class="ded-name">${esc(d.label)}</div><div class="ded-amt">−${fmt(d.amount)}</div><button class="debt-action-btn" onclick="window._delDed(${di})">✕</button></div>`).join("");
  document.getElementById("ded-section").style.display=p.showDed?"block":"none";
}

// PDF PRINT
window.printPDF=function(){
  if(activePi<0)return;
  const p=D.persons[activePi];
  const{receive,give,ded,net}=calcPerson(p);
  const today=fmtDate(todayStr());
  const debts=[...(p.debts||[])].map((d,i)=>({...d,_origIdx:i})).sort((a,b)=>{const da=a.date||"0000-00-00",db2=b.date||"0000-00-00";return da<db2?1:da>db2?-1:0;});
  const openDebts=debts.filter(d=>!d.paid);
  const paidDebts=debts.filter(d=>d.paid);
  const deds=p.deductions||[];
  const sentenceText = net>0
    ? `${p.name} deve a ${myName}: ${fmt(Math.abs(net))}`
    : net<0
    ? `${myName} deve a ${p.name}: ${fmt(Math.abs(net))}`
    : `${myName} e ${p.name} sono pari`;

  // Load jsPDF then generate
  const script=document.createElement("script");
  script.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
  script.onload=function(){
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const W=210, margin=20;
    let y=20;

    // Header
    doc.setFillColor(0,0,0);
    doc.rect(0,0,W,14,`F`);
    doc.setTextColor(255,255,255);
    doc.setFontSize(9);
    doc.setFont("helvetica","bold");
    doc.text("DEBITI APP",margin,9);
    doc.text(`Generato il ${today}`,W-margin,9,{align:"right"});
    y=26;

    // Title
    doc.setTextColor(0,0,0);
    doc.setFontSize(22);
    doc.setFont("helvetica","bold");
    doc.text(`Riepilogo — ${p.name}`,margin,y);
    y+=10;

    // Sentence box
    doc.setFillColor(240,250,243);
    doc.setDrawColor(52,199,89);
    doc.setLineWidth(0.8);
    doc.rect(margin,y,W-margin*2,12,`FD`);
    doc.setFontSize(12);
    doc.setFont("helvetica","bold");
    doc.setTextColor(20,20,20);
    doc.text(sentenceText,margin+4,y+7.5);
    y+=20;

    // Totals row
    const cards=[
      {label:"Mi devono dare",val:fmt(receive),color:[52,199,89]},
      {label:"Devo dare",val:fmt(give),color:[255,59,48]},
      ...(deds.length?[{label:"Sconti",val:"−"+fmt(ded),color:[142,142,147]}]:[]),
      {label:"Totale netto",val:fmt(Math.abs(net)),color:net>=0?[52,199,89]:[255,59,48]},
    ];
    const cw=(W-margin*2-(cards.length-1)*4)/cards.length;
    cards.forEach((c,i)=>{
      const cx=margin+i*(cw+4);
      doc.setFillColor(248,248,248);
      doc.setDrawColor(230,230,230);
      doc.setLineWidth(0.3);
      doc.rect(cx,y,cw,18,`FD`);
      doc.setFontSize(7);
      doc.setFont("helvetica","normal");
      doc.setTextColor(130,130,130);
      doc.text(c.label.toUpperCase(),cx+3,y+5);
      doc.setFontSize(11);
      doc.setFont("helvetica","bold");
      doc.setTextColor(...c.color);
      doc.text(c.val,cx+3,y+13);
    });
    y+=26;

    // Helper: table section
    function drawTable(title,rows){
      if(!rows.length)return;
      // Section title
      doc.setFontSize(8);
      doc.setFont("helvetica","bold");
      doc.setTextColor(80,80,80);
      doc.text(title.toUpperCase(),margin,y);
      y+=2;
      doc.setDrawColor(200,200,200);
      doc.setLineWidth(0.3);
      doc.line(margin,y,W-margin,y);
      y+=5;
      // Header
      doc.setFontSize(7);
      doc.setFont("helvetica","bold");
      doc.setTextColor(150,150,150);
      doc.text("DESCRIZIONE",margin,y);
      doc.text("DATA",margin+90,y);
      doc.text("TIPO",margin+118,y);
      doc.text("IMPORTO",W-margin,y,{align:"right"});
      y+=2;
      doc.line(margin,y,W-margin,y);
      y+=5;
      // Rows
      rows.forEach(d=>{
        if(y>270){doc.addPage();y=20;}
        doc.setFont("helvetica","normal");
        doc.setFontSize(9);
        doc.setTextColor(d.paid?160:20,d.paid?160:20,d.paid?160:20);
        const descLines=doc.splitTextToSize(d.desc,85);
        doc.text(descLines,margin,y);
        doc.setFontSize(8);
        doc.setTextColor(140,140,140);
        doc.text(fmtDate(d.date||""),margin+90,y);
        if(d.dir==="give"){doc.setTextColor(255,59,48);doc.text("↑ devo dare",margin+118,y);}
        else{doc.setTextColor(52,199,89);doc.text("↓ mi deve",margin+118,y);}
        doc.setFont("helvetica","bold");
        doc.setTextColor(d.paid?160:20,d.paid?160:20,d.paid?160:20);
        doc.setFontSize(9);
        doc.text(fmt(d.amount),W-margin,y,{align:"right"});
        y+=descLines.length>1?descLines.length*4+2:7;
        doc.setDrawColor(240,240,240);
        doc.setLineWidth(0.2);
        doc.line(margin,y-2,W-margin,y-2);
      });
      y+=6;
    }

    drawTable(`Voci aperte (${openDebts.length})`,openDebts);

    // Deductions
    if(deds.length){
      doc.setFontSize(8);doc.setFont("helvetica","bold");doc.setTextColor(80,80,80);
      doc.text("DA SOTTRARRE",margin,y);y+=2;
      doc.setDrawColor(200,200,200);doc.line(margin,y,W-margin,y);y+=5;
      deds.forEach(d=>{
        doc.setFontSize(9);doc.setFont("helvetica","normal");doc.setTextColor(40,40,40);
        doc.text(d.label,margin,y);
        doc.setTextColor(52,199,89);doc.setFont("helvetica","bold");
        doc.text("−"+fmt(d.amount),W-margin,y,{align:"right"});
        y+=7;
      });
      y+=4;
    }

    if(paidDebts.length) drawTable(`Storico pagati (${paidDebts.length})`,paidDebts);

    // Footer
    doc.setFontSize(8);doc.setFont("helvetica","normal");doc.setTextColor(180,180,180);
    doc.text(`Debiti App · ${p.name} · ${today}`,W/2,285,{align:"center"});

    // Save/share
    const pdfName=`Riepilogo_${p.name}_${todayStr()}.pdf`;
    const blob=doc.output("blob");
    const url=URL.createObjectURL(blob);
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[new File([blob],pdfName,{type:"application/pdf"})]})){
      navigator.share({title:`Riepilogo ${p.name}`,files:[new File([blob],pdfName,{type:"application/pdf"})]}).catch(()=>{});
    } else {
      const a=document.createElement("a");a.href=url;a.download=pdfName;a.click();
    }
  };
  document.head.appendChild(script);
};

window._toggleHistory=function(){
  if(activePi<0)return;
  D.persons[activePi].showHistory=!D.persons[activePi].showHistory;
  renderPanel();
};
window.startEdit=function(di){editingDi=di;editDir=D.persons[activePi].debts[di].dir;renderPanel();setTimeout(()=>document.getElementById("edit-desc")?.focus(),50);};
window.cancelEdit=function(){editingDi=-1;renderPanel();};
window.saveEdit=function(di){const desc=document.getElementById("edit-desc").value.trim();const amt=parseFloat(document.getElementById("edit-amt").value);const date=document.getElementById("edit-date").value;if(!desc||isNaN(amt)||amt<=0)return;D.persons[activePi].debts[di]={...D.persons[activePi].debts[di],desc,amount:amt,dir:editDir,date};editingDi=-1;saveAll();renderPanel();renderList();};
window._togglePaid=function(di){D.persons[activePi].debts[di].paid=!D.persons[activePi].debts[di].paid;saveAll();renderPanel();renderList();};
window._delDebt=function(di){D.persons[activePi].debts.splice(di,1);editingDi=-1;saveAll();renderPanel();renderList();};
window._delDed=function(di){D.persons[activePi].deductions.splice(di,1);saveAll();renderPanel();renderList();};
window.toggleDed=function(){if(activePi<0)return;D.persons[activePi].showDed=!D.persons[activePi].showDed;saveAll();renderPanel();};
window.addDebt=function(){if(activePi<0)return;const desc=document.getElementById("new-desc").value.trim();const amt=parseFloat(document.getElementById("new-amt").value);const date=document.getElementById("new-date").value||todayStr();if(!desc||isNaN(amt)||amt<=0)return;if(!D.persons[activePi].debts)D.persons[activePi].debts=[];D.persons[activePi].debts.push({desc,amount:amt,paid:false,dir:addDir,date});document.getElementById("new-desc").value="";document.getElementById("new-amt").value="";document.getElementById("new-date").value=todayStr();saveAll();renderPanel();renderList();document.getElementById("new-desc").focus();};
window.addDed=function(){if(activePi<0)return;const label=document.getElementById("new-dl").value.trim();const amt=parseFloat(document.getElementById("new-da").value);if(!label||isNaN(amt)||amt<=0)return;if(!D.persons[activePi].deductions)D.persons[activePi].deductions=[];D.persons[activePi].deductions.push({label,amount:amt});document.getElementById("new-dl").value="";document.getElementById("new-da").value="";saveAll();renderPanel();renderList();};
window.openAddPerson=function(){document.getElementById("modal-overlay").classList.add("open");setTimeout(()=>document.getElementById("modal-name").focus(),150);};
window.closeModal=function(){document.getElementById("modal-overlay").classList.remove("open");document.getElementById("modal-name").value="";};
window.confirmAddPerson=function(){const name=document.getElementById("modal-name").value.trim();if(!name)return;D.persons.push({name,color:COLORS[D.persons.length%COLORS.length],debts:[],deductions:[],showDed:false});saveAll();renderList();closeModal();setTimeout(()=>openPanel(D.persons.length-1),150);};
document.getElementById("modal-overlay").addEventListener("click",function(e){if(e.target===this)window.closeModal();});
</script>
